kind = "web"
previewPath = "/"
title = "AREA 69 — AI Models Studio"
version = "1.0.0"
id = "artifacts/area69"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19902

[services.development]
run = "pnpm --filter @workspace/area69 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/area69", "run", "build" ]
publicDir = "artifacts/area69/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19902"
BASE_PATH = "/"
