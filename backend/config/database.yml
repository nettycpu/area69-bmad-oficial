default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV["TEST_DATABASE_URL"] || ENV["DATABASE_URL"]&.sub(%r{/([^/?]+)(\?.*)?\z}, '/\1_test\2') %>

production:
  <<: *default
