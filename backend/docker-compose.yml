services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: area69
      POSTGRES_PASSWORD: area69_dev
      POSTGRES_DB: area69_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U area69 -d area69_development"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://area69:area69_dev@db:5432/area69_development"
      RAILS_ENV: development
      RAILS_MAX_THREADS: 5
      WAVESPEED_API_KEY: ${WAVESPEED_API_KEY:-}
      HIGGSFIELD_API_KEY: ${HIGGSFIELD_API_KEY:-}
      HIGGSFIELD_API_SECRET: ${HIGGSFIELD_API_SECRET:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_50_CREDITS: ${STRIPE_PRICE_50_CREDITS:-}
      STRIPE_PRICE_150_CREDITS: ${STRIPE_PRICE_150_CREDITS:-}
      STRIPE_PRICE_300_CREDITS: ${STRIPE_PRICE_300_CREDITS:-}
      STRIPE_PRICE_600_CREDITS: ${STRIPE_PRICE_600_CREDITS:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
